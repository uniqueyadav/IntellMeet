version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: intellmeet-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - intellmeet-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intellmeet-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/intellmeet
      - JWT_SECRET=super_secret_dev_key_12345
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - intellmeet-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intellmeet-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - intellmeet-network

volumes:
  mongo-data:

networks:
  intellmeet-network:
    driver: bridge
